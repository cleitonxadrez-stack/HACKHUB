<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/logo-hackhub.png">
  <title>Contato — HACK HUB®</title>
  <meta name="description" content="Entre em contato com a equipe do HACK HUB.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contato">
  <div id="header-placeholder"></div>
  <main>
    <section class="gradient-hero py-20 text-white text-center">
      <div class="max-w-4xl mx-auto px-4">
        <span class="badge badge-yellow mb-4"><i class="fa-solid fa-envelope mr-1.5"></i> Contato</span>
        <h1 class="font-display text-4xl sm:text-5xl font-extrabold mb-4">Fale com o HACK HUB</h1>
        <p class="text-slate-200 text-lg">Tire suas dúvidas, sugira parcerias ou saiba como levar o HACK HUB para sua escola.</p>
      </div>
    </section>
    <section class="py-20 bg-white">
      <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <form class="space-y-5 bg-slate-50 p-8 rounded-2xl">
          <div>
            <label class="block text-sm font-semibold text-slate-900 mb-1.5" for="contact-name">Nome</label>
            <input id="contact-name" type="text" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow" placeholder="Seu nome completo">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-900 mb-1.5" for="contact-email">E-mail</label>
            <input id="contact-email" type="email" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow" placeholder="seuemail@exemplo.com">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-900 mb-1.5" for="contact-message">Mensagem</label>
            <textarea id="contact-message" rows="5" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow" placeholder="Como podemos ajudar?"></textarea>
          </div>
          <button type="button" onclick="alert('Mensagem enviada! Em breve entraremos em contato.')" class="btn-accent w-full px-7 py-3.5 rounded-lg font-semibold">Enviar mensagem</button>
        </form>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/common.js"></script>
</body>
</html>
